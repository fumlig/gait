name: gait

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-3000}:8000"
    volumes:
      - ${VOICES_DIR:-./voices}:/app/voices
    environment:
      - PROVIDERS=${PROVIDERS:-llamacpp,chatterbox,whisperx,voices}
      - LLAMACPP_URL=${LLAMACPP_URL:-http://llamacpp:8000}
      - CHATTERBOX_URL=${CHATTERBOX_URL:-http://chatterbox:8000}
      - WHISPERX_URL=${WHISPERX_URL:-http://whisperx:8000}
      - VOICES_DIR=${VOICES_DIR:-/app/voices}
      - BACKEND_TIMEOUT=${BACKEND_TIMEOUT:-300}
    depends_on:
      chatterbox:
        condition: service_healthy
      whisperx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  chatterbox:
    build:
      context: .
      dockerfile: services/chatterbox/Dockerfile
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
      - ${VOICES_DIR:-./voices}:/app/voices
    environment:
      - DEVICE=${CHATTERBOX_DEVICE:-cuda}
      - DEFAULT_MODEL=${CHATTERBOX_DEFAULT_MODEL:-chatterbox-turbo}
      - MODEL_IDLE_TIMEOUT=${CHATTERBOX_IDLE_TIMEOUT:-300}
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  whisperx:
    build:
      context: .
      dockerfile: services/whisperx/Dockerfile
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - DEVICE=${WHISPERX_DEVICE:-cuda}
      - DEFAULT_MODEL=${WHISPERX_DEFAULT_MODEL:-turbo}
      - COMPUTE_TYPE=${WHISPERX_COMPUTE_TYPE:-float16}
      - BATCH_SIZE=${WHISPERX_BATCH_SIZE:-16}
      - ENABLE_DIARIZATION=${WHISPERX_ENABLE_DIARIZATION:-false}
      - MODEL_IDLE_TIMEOUT=${WHISPERX_IDLE_TIMEOUT:-0}
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  llamacpp:
    build:
      context: .
      # dockerfile: services/llamacpp/Dockerfile
      # args:
      #   - LLAMA_SERVER_TAG=${LLAMA_SERVER_TAG:-server-cuda}
      dockerfile: services/llamacpp/Dockerfile
      args:
        - CUDA_VERSION=${CUDA_VERSION:-12.4.0}
        - UBUNTU_VERSION=${UBUNTU_VERSION:-22.04}
        - LLAMA_REPO=${LLAMA_REPO:-https://github.com/ggml-org/llama.cpp.git}
        - LLAMA_BRANCH=${LLAMA_BRANCH:-master}
        - CUDA_DOCKER_ARCH=${CUDA_DOCKER_ARCH:-default}
    ports:
      # Exposes the llama-server native web UI (and raw OpenAI API) on the host.
      # The gateway still talks to the container internally over the docker network.
      - "${LLAMACPP_WEBUI_PORT:-8090}:8000"
    volumes:
      - ${LLAMA_CACHE:-./models}:/root/.cache/llama.cpp
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - LLAMA_ARG_MODEL=${LLAMA_MODEL:-}
      # Default: Gemma 4 E4B (Q8_0). E2B/E4B are the only Gemma 4 variants with
      # audio input support. mmproj is auto-downloaded from the same repo by -hf.
      - LLAMA_ARG_HF_REPO=${LLAMA_HF_REPO:-unsloth/gemma-4-E4B-it-GGUF:Q8_0}
      # Optional explicit overrides for the multimodal projector. Leave unset to
      # let llama-server auto-detect from the HF repo above.
      # - LLAMA_ARG_MMPROJ=${LLAMA_MMPROJ:-}
      # - LLAMA_ARG_MMPROJ_URL=${LLAMA_MMPROJ_URL:-}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8000
      - LLAMA_ARG_CTX_SIZE=${LLAMA_CTX_SIZE:-16384}
      - LLAMA_ARG_N_GPU_LAYERS=${LLAMA_N_GPU_LAYERS:-32}
      - LLAMA_ARG_N_PARALLEL=${LLAMA_N_PARALLEL:-1}
      - LLAMA_ARG_FLASH_ATTN=${LLAMA_FLASH_ATTN:-on}
      # Auto-fit graph reservation. Upstream default is `on`, but currently
      # asserts on Gemma 4 (GGML_SCHED_MAX_SPLIT_INPUTS). Set LLAMA_FIT=off in
      # .env when running Gemma 4.
      - LLAMA_ARG_FIT=${LLAMA_FIT:-on}
      - LLAMA_ARG_EMBEDDINGS=${LLAMA_EMBEDDINGS:-1}
      - LLAMA_ARG_POOLING=${LLAMA_POOLING:-mean}
      - LLAMA_ARG_SLEEP_IDLE_SECONDS=${LLAMA_IDLE_TIMEOUT:--1}
      - LLAMA_ARG_JINJA=${LLAMA_JINJA:-true}
      - LLAMA_ARG_REASONING_FORMAT=${LLAMA_REASONING_FORMAT:-deepseek}
      - LLAMA_ARG_TEMP=${LLAMA_TEMP:-1.0}
      - LLAMA_ARG_TOP_P=${LLAMA_TOP_P:-0.95}
      # Gemma 4 recommends top_k=64 (Qwen used 20).
      - LLAMA_ARG_TOP_K=${LLAMA_TOP_K:-64}
      - LLAMA_ARG_MIN_P=${LLAMA_MIN_P:-0.0}
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
