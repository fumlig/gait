name: gait

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-3000}:8000"
    volumes:
      - ${VOICES_DIR:-./voices}:/app/voices
    environment:
      - PROVIDERS=${PROVIDERS:-llamacpp,chatterbox,whisperx,voices}
      - LLAMACPP_URL=${LLAMACPP_URL:-http://llamacpp:8000}
      - CHATTERBOX_URL=${CHATTERBOX_URL:-http://chatterbox:8000}
      - WHISPERX_URL=${WHISPERX_URL:-http://whisperx:8000}
      - VOICES_DIR=${VOICES_DIR:-/app/voices}
      - BACKEND_TIMEOUT=${BACKEND_TIMEOUT:-300}
    depends_on:
      chatterbox:
        condition: service_healthy
      whisperx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  chatterbox:
    build:
      context: .
      dockerfile: services/chatterbox/Dockerfile
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
      - ${VOICES_DIR:-./voices}:/app/voices
    environment:
      - DEVICE=${CHATTERBOX_DEVICE:-cuda}
      - DEFAULT_MODEL=${CHATTERBOX_DEFAULT_MODEL:-chatterbox-turbo}
      - MODEL_IDLE_TIMEOUT=${CHATTERBOX_IDLE_TIMEOUT:-300}
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  whisperx:
    build:
      context: .
      dockerfile: services/whisperx/Dockerfile
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - DEVICE=${WHISPERX_DEVICE:-cuda}
      - DEFAULT_MODEL=${WHISPERX_DEFAULT_MODEL:-turbo}
      - COMPUTE_TYPE=${WHISPERX_COMPUTE_TYPE:-float16}
      - BATCH_SIZE=${WHISPERX_BATCH_SIZE:-16}
      - ENABLE_DIARIZATION=${WHISPERX_ENABLE_DIARIZATION:-false}
      - MODEL_IDLE_TIMEOUT=${WHISPERX_IDLE_TIMEOUT:-0}
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  llamacpp:
    build:
      context: .
      # dockerfile: services/llamacpp/Dockerfile
      # args:
      #   - LLAMA_SERVER_TAG=${LLAMA_SERVER_TAG:-server-cuda}
      dockerfile: services/llamacpp/Dockerfile
      args:
        - CUDA_VERSION=${CUDA_VERSION:-12.4.0}
        - UBUNTU_VERSION=${UBUNTU_VERSION:-22.04}
        - LLAMA_REPO=${LLAMA_REPO:-https://github.com/ggml-org/llama.cpp.git}
        - LLAMA_BRANCH=${LLAMA_BRANCH:-master}
        - CUDA_DOCKER_ARCH=${CUDA_DOCKER_ARCH:-default}
    ports:
      # Exposes the llama-server native web UI (and raw OpenAI API) on the host.
      # The gateway still talks to the container internally over the docker network.
      - "${LLAMACPP_WEBUI_PORT:-8090}:8000"
    volumes:
      # llama.cpp's native cache. Falls back to HF_HOME when LLAMA_CACHE is
      # unset — llama-server now honours HF_HOME for model lookups, so a
      # single shared cache is fine.
      - ${LLAMA_CACHE:-${HF_HOME:-${HOME}/.cache/huggingface}}:/root/.cache/llama.cpp
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      # Preset file mounted read-only. Edit this to add/remove/retune models.
      - ./config/llama-models.ini:/config/llama-models.ini:ro
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8000
      # Router mode: model-level tuning lives in the preset file, not env vars.
      - LLAMA_ARG_MODELS_PRESET=/config/llama-models.ini
      # Only ever keep one model resident at a time. Raise to load more
      # presets simultaneously (at the cost of VRAM).
      - LLAMA_ARG_MODELS_MAX=${LLAMA_MODELS_MAX:-1}
      # Auto-unload idle models. -1 disables. Set LLAMA_IDLE_TIMEOUT to a
      # positive number of seconds to free VRAM after inactivity.
      - LLAMA_ARG_SLEEP_IDLE_SECONDS=${LLAMA_IDLE_TIMEOUT:--1}
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
