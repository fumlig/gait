name: gait

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-3000}:8000"
    volumes:
      - ${VOICES_DIR:-./voices}:/app/voices
    environment:
      - CHATTERBOX_URL=http://chatterbox:8000
      - WHISPERX_URL=http://whisperx:8000
      - LLAMACPP_URL=${LLAMACPP_URL:-http://llamacpp:8000}
      - VOICES_DIR=/app/voices
      - BACKEND_TIMEOUT=${BACKEND_TIMEOUT:-300}
    depends_on:
      chatterbox:
        condition: service_healthy
      whisperx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  chatterbox:
    build:
      context: .
      dockerfile: services/chatterbox/Dockerfile
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
      - ${VOICES_DIR:-./voices}:/app/voices
    environment:
      - DEVICE=${CHATTERBOX_DEVICE:-cuda}
      - DEFAULT_MODEL=${CHATTERBOX_DEFAULT_MODEL:-chatterbox}
      - MODEL_IDLE_TIMEOUT=${CHATTERBOX_IDLE_TIMEOUT:-0}
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  whisperx:
    build:
      context: .
      dockerfile: services/whisperx/Dockerfile
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - DEVICE=${WHISPERX_DEVICE:-cuda}
      - DEFAULT_MODEL=${WHISPERX_DEFAULT_MODEL:-large-v3}
      - COMPUTE_TYPE=${WHISPERX_COMPUTE_TYPE:-float16}
      - BATCH_SIZE=${WHISPERX_BATCH_SIZE:-16}
      - ENABLE_DIARIZATION=${WHISPERX_ENABLE_DIARIZATION:-false}
      - MODEL_IDLE_TIMEOUT=${WHISPERX_IDLE_TIMEOUT:-0}
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  llamacpp:
    build:
      context: .
      dockerfile: services/llamacpp/Dockerfile
      args:
        - LLAMA_SERVER_TAG=${LLAMA_SERVER_TAG:-server-cuda}
    volumes:
      - ${MODELS_DIR:-${LLAMA_CACHE:-./models}}:/root/.cache/llama.cpp
    environment:
      - LLAMA_ARG_MODEL=${LLAMA_MODEL:-}
      - LLAMA_ARG_HF_REPO=${LLAMA_HF_REPO:-}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8000
      - LLAMA_ARG_CTX_SIZE=${LLAMA_CTX_SIZE:-4096}
      - LLAMA_ARG_N_GPU_LAYERS=${LLAMA_N_GPU_LAYERS:-99}
      - LLAMA_ARG_EMBEDDINGS=${LLAMA_EMBEDDINGS:-1}
      - LLAMA_ARG_POOLING=${LLAMA_POOLING:-mean}
      - LLAMA_ARG_SLEEP_IDLE_SECONDS=${LLAMA_IDLE_TIMEOUT:--1}
      - LLAMA_ARG_JINJA=${LLAMA_JINJA:-true}
      - LLAMA_ARG_TEMP=${LLAMA_TEMP:-1.0}
      - LLAMA_ARG_TOP_P=${LLAMA_TOP_P:-0.95}
      - LLAMA_ARG_TOP_K=${LLAMA_TOP_K:-20}
      - LLAMA_ARG_MIN_P=${LLAMA_MIN_P:-0.0}
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
