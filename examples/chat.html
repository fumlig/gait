<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Trave Chat</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
            }
            :root {
                color-scheme: light dark;
            }
            html,
            body {
                height: 100%;
            }

            body {
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                display: flex;
                flex-direction: column;
            }

            /* ── Header ──────────────────────────────────── */

            header {
                padding: 0.75rem 1rem;
                border-bottom: 1px solid light-dark(#e0e0e0, #333);
            }

            header > hgroup {
                display: flex;
                align-items: baseline;
                gap: 0.75rem;
            }
            header h1 {
                font-size: 1.2rem;
            }
            header p {
                font-size: 0.8rem;
                opacity: 0.5;
            }

            details {
                margin-top: 0.5rem;
            }
            details summary {
                cursor: pointer;
                font-size: 0.85rem;
                opacity: 0.6;
            }

            .settings {
                display: grid;
                grid-template-columns: 5.5rem 1fr;
                gap: 0.35rem 0.75rem;
                align-items: center;
                margin-top: 0.75rem;
                font-size: 0.85rem;
            }

            .settings label {
                opacity: 0.7;
            }

            .settings select,
            .settings input,
            .settings textarea {
                font: inherit;
                padding: 0.3rem 0.5rem;
                border: 1px solid light-dark(#ccc, #555);
                border-radius: 0.25rem;
                background: transparent;
                color: inherit;
            }

            .settings textarea {
                grid-column: 1 / -1;
                resize: vertical;
            }

            .settings .row {
                display: flex;
                gap: 0.5rem;
            }

            .settings .row > input {
                flex: 1;
                min-width: 0;
            }

            .settings button {
                font: inherit;
                padding: 0.3rem 0.75rem;
                border: 1px solid light-dark(#ccc, #555);
                border-radius: 0.25rem;
                background: transparent;
                color: inherit;
                cursor: pointer;
                white-space: nowrap;
            }

            /* ── Messages ────────────────────────────────── */

            main {
                flex: 1;
                overflow-y: auto;
                padding: 1rem;
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
            }

            .empty {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0.25;
                font-size: 0.9rem;
            }

            article {
                max-width: 75%;
                padding: 0.6rem 0.9rem;
                border-radius: 1rem;
                line-height: 1.5;
            }

            article.user {
                align-self: flex-end;
                background: light-dark(#e3f2fd, #1a3a5c);
                border-bottom-right-radius: 0.25rem;
            }

            article.assistant {
                align-self: flex-start;
                background: light-dark(#f5f5f5, #262626);
                border-bottom-left-radius: 0.25rem;
            }

            article .role {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 0.7rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                opacity: 0.45;
                margin-bottom: 0.15rem;
            }

            article .content {
                white-space: pre-wrap;
                word-break: break-word;
            }

            .speak-msg {
                all: unset;
                cursor: pointer;
                opacity: 0.6;
                font-size: 0.8rem;
            }

            .speak-msg:hover {
                opacity: 1;
            }

            /* ── Footer ──────────────────────────────────── */

            footer {
                padding: 0.75rem 1rem;
                border-top: 1px solid light-dark(#e0e0e0, #333);
            }

            footer form {
                display: flex;
                gap: 0.5rem;
                align-items: center;
            }

            #user-input {
                flex: 1;
                font: inherit;
                padding: 0.5rem 0.75rem;
                border: 1px solid light-dark(#ccc, #555);
                border-radius: 1rem;
                background: transparent;
                color: inherit;
            }

            #send-btn {
                font: inherit;
                font-weight: 500;
                padding: 0.5rem 1rem;
                border: none;
                border-radius: 1rem;
                cursor: pointer;
                background: light-dark(#1976d2, #90caf9);
                color: light-dark(#fff, #111);
            }

            #send-btn:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }

            #record-btn {
                font-size: 1.3rem;
                background: none;
                border: none;
                cursor: pointer;
                padding: 0.25rem;
            }

            #record-btn:disabled {
                opacity: 0.25;
                cursor: not-allowed;
            }

            #record-btn.recording {
                color: #ef5350;
                animation: pulse 1s ease-in-out infinite;
            }

            @keyframes pulse {
                50% {
                    opacity: 0.4;
                }
            }

            #speak-label {
                font-size: 1.2rem;
                cursor: pointer;
                user-select: none;
                opacity: 0.4;
                transition: opacity 0.15s;
            }

            #speak-label.active {
                opacity: 1;
            }
            #speak-toggle {
                display: none;
            }

            /* ── Toast ────────────────────────────────────── */

            .toast {
                position: fixed;
                bottom: 5rem;
                left: 50%;
                translate: -50% 0;
                background: #c62828;
                color: #fff;
                padding: 0.5rem 1.25rem;
                border-radius: 0.5rem;
                font-size: 0.8rem;
                z-index: 100;
                opacity: 1;
                animation: fadeout 4s ease forwards;
            }

            @keyframes fadeout {
                75% {
                    opacity: 1;
                }
                100% {
                    opacity: 0;
                }
            }

            @media (max-width: 600px) {
                article {
                    max-width: 90%;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <hgroup>
                <h1>Trave Chat</h1>
                <p>Local AI, OpenAI-compatible</p>
            </hgroup>
            <details>
                <summary>Settings</summary>
                <div class="settings">
                    <label for="api-url">API URL</label>
                    <div class="row">
                        <input
                            id="api-url"
                            type="url"
                            value="http://localhost:3000"
                        />
                        <button type="button" id="connect-btn">Connect</button>
                    </div>

                    <label for="chat-model">Chat</label>
                    <select id="chat-model"></select>

                    <label for="tts-model">TTS</label>
                    <select id="tts-model"></select>

                    <label for="tts-voice">Voice</label>
                    <select id="tts-voice"></select>

                    <label for="stt-model">STT</label>
                    <select id="stt-model"></select>

                    <textarea
                        id="system-prompt"
                        rows="2"
                        placeholder="System prompt (optional)"
                    >
You are a helpful assistant.</textarea
                    >
                </div>
            </details>
        </header>

        <main id="messages">
            <div class="empty">Send a message to start chatting</div>
        </main>

        <footer>
            <form id="chat-form">
                <input
                    type="text"
                    id="user-input"
                    placeholder="Type a message…"
                    autocomplete="off"
                />
                <button type="submit" id="send-btn" disabled>Send</button>
                <button
                    type="button"
                    id="record-btn"
                    disabled
                    title="Hold to record"
                >
                    🎤
                </button>
                <label id="speak-label" title="Stream audio with responses">
                    <input type="checkbox" id="speak-toggle" />🔊
                </label>
            </form>
        </footer>

        <script type="module">
            // ── DOM references ────────────────────────────────────────────
            const $ = (s) => document.querySelector(s);
            const messagesEl = $("#messages");
            const userInput = $("#user-input");
            const sendBtn = $("#send-btn");
            const recordBtn = $("#record-btn");

            // ── State ─────────────────────────────────────────────────────
            const conversation = []; // { role, content }[]
            let generating = false;
            let recording = false;
            let recorder = null; // MediaRecorder

            // ── PCM16 streaming player ────────────────────────────────────

            class PCMPlayer {
                /** Queue base64-encoded PCM16 chunks for gapless playback. */
                constructor(sampleRate = 24000) {
                    this.ctx = new AudioContext({ sampleRate });
                    this.ctx.resume();
                    this.scheduledEnd = 0;
                }

                feed(base64Data) {
                    const binary = atob(base64Data);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++)
                        bytes[i] = binary.charCodeAt(i);

                    const int16 = new Int16Array(bytes.buffer);
                    const float32 = new Float32Array(int16.length);
                    for (let i = 0; i < int16.length; i++)
                        float32[i] = int16[i] / 32768;

                    const buffer = this.ctx.createBuffer(
                        1,
                        float32.length,
                        this.ctx.sampleRate,
                    );
                    buffer.getChannelData(0).set(float32);

                    const source = this.ctx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(this.ctx.destination);

                    const now = this.ctx.currentTime;
                    const start = Math.max(now + 0.02, this.scheduledEnd);
                    source.start(start);
                    this.scheduledEnd = start + buffer.duration;
                }

                async stop() {
                    await this.ctx.close();
                }
            }

            // ── Helpers ───────────────────────────────────────────────────
            const baseURL = () => $("#api-url").value.replace(/\/+$/, "");

            function toast(msg) {
                const el = document.createElement("div");
                el.className = "toast";
                el.textContent = msg;
                document.body.appendChild(el);
                el.addEventListener("animationend", () => el.remove());
            }

            function scrollDown() {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }

            function setReady(ok) {
                sendBtn.disabled = !ok;
                recordBtn.disabled = !ok;
            }

            function populateSelect(sel, items, key = "id") {
                const prev = sel.value;
                sel.innerHTML = "";
                for (const item of items) {
                    const val = item[key] ?? item.id ?? item.name;
                    sel.append(new Option(val, val));
                }
                if (prev && [...sel.options].some((o) => o.value === prev))
                    sel.value = prev;
            }

            // ── API calls ─────────────────────────────────────────────────

            /** Fetch JSON, throwing on non-2xx. */
            async function api(path, init = {}) {
                const res = await fetch(`${baseURL()}${path}`, init);
                if (!res.ok)
                    throw new Error((await res.text()) || `HTTP ${res.status}`);
                return res;
            }

            /** Synthesize text to audio and play it (on-demand, non-streaming). */
            function speak(text) {
                const model = $("#tts-model").value;
                const voice = $("#tts-voice").value;
                if (!model || !voice) {
                    toast("Select a TTS model and voice in settings");
                    return;
                }

                return api("/v1/audio/speech", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model,
                        input: text,
                        voice,
                        response_format: "wav",
                    }),
                })
                    .then((r) => r.blob())
                    .then(
                        (blob) =>
                            new Promise((resolve) => {
                                const url = URL.createObjectURL(blob);
                                const audio = new Audio(url);
                                audio.onended = audio.onerror = () => {
                                    URL.revokeObjectURL(url);
                                    resolve();
                                };
                                audio.play();
                            }),
                    )
                    .catch((e) => toast(`Speech failed: ${e.message}`));
            }

            /** Transcribe an audio blob, returning the text string. */
            async function transcribe(blob) {
                const model = $("#stt-model").value;
                if (!model) {
                    toast("Select an STT model in settings");
                    return "";
                }

                const form = new FormData();
                form.append("file", blob, "recording.webm");
                form.append("model", model);
                form.append("response_format", "json");

                const res = await api("/v1/audio/transcriptions", {
                    method: "POST",
                    body: form,
                });
                return (await res.json()).text ?? "";
            }

            // ── Message rendering ─────────────────────────────────────────

            function addMessage(role, text = "") {
                messagesEl.querySelector(".empty")?.remove();

                const article = document.createElement("article");
                article.className = role;

                const roleEl = document.createElement("div");
                roleEl.className = "role";

                const label = document.createElement("strong");
                label.textContent = role === "user" ? "You" : "Assistant";
                roleEl.appendChild(label);

                if (role === "assistant") {
                    const btn = document.createElement("button");
                    btn.className = "speak-msg";
                    btn.textContent = "🔊";
                    btn.title = "Speak this message";
                    btn.onclick = () => speak(contentEl.textContent);
                    roleEl.appendChild(btn);
                }

                const contentEl = document.createElement("p");
                contentEl.className = "content";
                contentEl.textContent = text;

                article.append(roleEl, contentEl);
                messagesEl.appendChild(article);
                scrollDown();
                return contentEl;
            }

            // ── Chat flow ─────────────────────────────────────────────────

            async function send(text) {
                text = text.trim();
                if (!text || generating) return;

                const model = $("#chat-model").value;
                if (!model) {
                    toast("Select a chat model in settings");
                    return;
                }

                conversation.push({ role: "user", content: text });
                addMessage("user", text);
                userInput.value = "";

                const system = $("#system-prompt").value.trim();
                const msgs = system
                    ? [{ role: "system", content: system }, ...conversation]
                    : [...conversation];

                generating = true;
                setReady(false);

                const contentEl = addMessage("assistant");
                let full = "";

                // Decide whether to request inline streaming audio.
                const wantAudio = $("#speak-toggle").checked;
                const ttsModel = $("#tts-model").value;
                const ttsVoice = $("#tts-voice").value;
                const useAudioModality = wantAudio && ttsModel && ttsVoice;
                let player = null;

                try {
                    const body = { model, messages: msgs, stream: true };

                    if (useAudioModality) {
                        body.modalities = ["text", "audio"];
                        body.audio = {
                            voice: ttsVoice,
                            format: "pcm16",
                            model: ttsModel,
                        };
                        player = new PCMPlayer();
                    }

                    const res = await fetch(
                        `${baseURL()}/v1/chat/completions`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(body),
                        },
                    );

                    if (!res.ok)
                        throw new Error(
                            (await res.text()) || `HTTP ${res.status}`,
                        );

                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let buf = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buf += decoder.decode(value, { stream: true });

                        const lines = buf.split("\n");
                        buf = lines.pop();

                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed.startsWith("data: ")) continue;
                            const payload = trimmed.slice(6);
                            if (payload === "[DONE]") continue;

                            try {
                                const delta =
                                    JSON.parse(payload).choices?.[0]?.delta;

                                // Text token
                                if (delta?.content) {
                                    full += delta.content;
                                    contentEl.textContent = full;
                                    scrollDown();
                                }

                                // Streaming audio chunk (PCM16)
                                if (delta?.audio?.data && player) {
                                    player.feed(delta.audio.data);
                                }
                            } catch {
                                /* skip malformed chunks */
                            }
                        }
                    }
                } catch (e) {
                    toast(`Chat error: ${e.message}`);
                    if (!full)
                        contentEl.textContent =
                            "⚠ Failed to generate a response.";
                }

                conversation.push({ role: "assistant", content: full });
                generating = false;
                setReady(true);
                userInput.focus();

                // Fallback: if speak was requested but audio modality wasn't available,
                // synthesize the full response after the fact.
                if (wantAudio && !useAudioModality && full) speak(full);
            }

            // ── Recording flow ────────────────────────────────────────────

            async function toggleRecording() {
                if (recording) {
                    recorder?.stop();
                    return;
                }

                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                    });
                } catch {
                    toast("Microphone access denied");
                    return;
                }

                const chunks = [];
                recorder = new MediaRecorder(stream);
                recorder.ondataavailable = (e) => {
                    if (e.data.size) chunks.push(e.data);
                };

                recorder.onstop = async () => {
                    stream.getTracks().forEach((t) => t.stop());
                    recording = false;
                    recordBtn.classList.remove("recording");
                    recordBtn.textContent = "🎤";

                    if (!chunks.length) return;
                    const blob = new Blob(chunks, { type: recorder.mimeType });

                    userInput.value = "Transcribing…";
                    userInput.disabled = true;
                    try {
                        userInput.value = await transcribe(blob);
                    } catch (e) {
                        userInput.value = "";
                        toast(`Transcription failed: ${e.message}`);
                    }
                    userInput.disabled = false;
                    userInput.focus();
                };

                recorder.start();
                recording = true;
                recordBtn.classList.add("recording");
                recordBtn.textContent = "⏹";
            }

            // ── Connect & populate selects ────────────────────────────────

            async function connect() {
                const btn = $("#connect-btn");
                btn.textContent = "…";

                try {
                    const [modelsRes, voicesRes] = await Promise.all([
                        api("/v1/models").then((r) => r.json()),
                        api("/v1/audio/voices")
                            .then((r) => r.json())
                            .catch(() => ({ data: [] })),
                    ]);

                    const models = modelsRes.data ?? [];
                    const voices = voicesRes.data ?? [];

                    populateSelect($("#chat-model"), models);
                    populateSelect($("#tts-model"), models);
                    populateSelect($("#stt-model"), models);
                    populateSelect($("#tts-voice"), voices, "name");

                    // Auto-select models by heuristic
                    for (const m of models) {
                        const id = m.id.toLowerCase();
                        if (
                            !$("#chat-model").value &&
                            !id.includes("whisper") &&
                            !id.includes("chatterbox")
                        )
                            $("#chat-model").value = m.id;
                        if (!$("#tts-model").value && id.includes("chatterbox"))
                            $("#tts-model").value = m.id;
                        if (!$("#stt-model").value && id.includes("whisper"))
                            $("#stt-model").value = m.id;
                    }

                    setReady(true);
                    btn.textContent = "Connected ✓";
                } catch (e) {
                    setReady(false);
                    btn.textContent = "Retry";
                    toast(`Connection failed — is the gateway running?`);
                }
            }

            // ── Event listeners ───────────────────────────────────────────

            $("#chat-form").addEventListener("submit", (e) => {
                e.preventDefault();
                send(userInput.value);
            });
            $("#record-btn").addEventListener("click", toggleRecording);
            $("#connect-btn").addEventListener("click", connect);

            $("#speak-label").addEventListener("click", () => {
                requestAnimationFrame(() => {
                    $("#speak-label").classList.toggle(
                        "active",
                        $("#speak-toggle").checked,
                    );
                });
            });

            // Connect on load
            connect();
        </script>
    </body>
</html>
