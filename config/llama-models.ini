; llama-server model presets.
;
; Consumed by llama-server's router mode (--models-preset). Each section
; defines a named model entry whose keys map to llama-server CLI arguments
; (without the leading dashes). Short argument forms (e.g. c, ngl) and
; LLAMA_ARG_* environment variable names are also accepted as keys.
;
; Precedence (highest wins):
;   1. Command-line arguments passed to llama-server itself
;   2. Model-specific section (e.g. [unsloth/gemma-4-E4B-it-GGUF:Q8_0])
;   3. Global [*] section (applied to every model)
;
; Router-controlled args (host, port, api-key, -hf, alias) will be
; stripped or overwritten by llama-server when it spawns a child.
;
; Callers select a preset by passing its section name as the `model`
; field in the JSON body of a chat/completions/embeddings request.

version = 1

; ---------------------------------------------------------------------------
; Global defaults shared by every preset. Individual sections may override
; any of these.
; ---------------------------------------------------------------------------
[*]
; Conservative defaults that work for every supported preset.
ctx-size = 16384
n-gpu-layers = 99
n-parallel = 1
flash-attn = on
jinja = true
reasoning-format = deepseek
; Auto-fit graph reservation. Upstream default is `on`, but currently
; asserts on Gemma 4 (GGML_SCHED_MAX_SPLIT_INPUTS). Gemma 4 presets
; override this to `off` below.
fit = on
; Embeddings endpoint + pooling. Gemma 4 is a decoder-only model so
; pooling is a no-op for chat but required for /v1/embeddings to work.
embeddings = true
pooling = mean
; Sampler defaults. Individual presets may override these.
temp = 1.0
top-p = 0.95
top-k = 64
min-p = 0.0

; ---------------------------------------------------------------------------
; Gemma 4 E4B-it (Q8_0) — default preset, preloaded on startup.
;
; E2B/E4B are the only Gemma 4 variants with audio input support.
; llama-server auto-downloads the sibling mmproj-*.gguf from the same
; HF repo (controlled by --mmproj-auto, on by default), which is what
; enables vision/audio input.
; ---------------------------------------------------------------------------
[unsloth/gemma-4-E4B-it-GGUF:Q8_0]
; Preload on startup so the first request has no load latency.
load-on-startup = true
; Gemma 4 currently trips a GGML_SCHED_MAX_SPLIT_INPUTS assert with
; --fit=on, so force it off for this preset.
fit = off
; Gemma 4 recommended samplers (unsloth guidance).
temp = 1.0
top-p = 0.95
top-k = 64
min-p = 0.0
